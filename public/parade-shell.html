<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDtv Parade Glass Shell</title>
<style>
  html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden;}
  .glass{position:absolute;inset:0;border-radius:16px;overflow:hidden;
    background:rgba(10,18,38,.52);
    backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%);
    border:1px solid rgba(255,255,255,.26);
    box-shadow:inset 0 2px 0 rgba(255,255,255,.5),inset 0 -1px 1px rgba(255,255,255,.08),0 14px 34px rgba(0,0,0,.5);}
  .glow{position:absolute;inset:0;z-index:1;mix-blend-mode:screen;opacity:.85;pointer-events:none;
    background:radial-gradient(46% 92% at 3% 60%,rgba(220,54,74,.9),transparent 72%),
               radial-gradient(48% 96% at 99% 48%,rgba(58,112,232,1),transparent 72%);}
  .tex{position:absolute;top:0;left:0;width:58%;height:54%;z-index:2;pointer-events:none;opacity:.5;
    background:radial-gradient(circle at 12px 10px,rgba(255,255,255,.10) 0 1.5px,transparent 2px);background-size:22px 20px;}
  .tri{position:absolute;left:0;right:0;bottom:0;height:5px;z-index:4;
    background:linear-gradient(90deg,#c2283a 0 33.3%,#eef1f6 33.3% 66.6%,#234fb0 66.6% 100%);}
  .sheen{position:absolute;top:0;left:-55%;width:40%;height:100%;z-index:6;pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-18deg);
    animation:sweep 8s linear 2s infinite;}
  .sp{position:absolute;z-index:5;background:#fff;pointer-events:none;opacity:0;
    clip-path:polygon(50% 0,58% 42%,100% 50%,58% 58%,50% 100%,42% 58%,0 50%,42% 42%);
    animation:tw 3.4s ease-in-out infinite;}
  @keyframes sweep{0%{left:-55%;}18%{left:150%;}100%{left:150%;}}
  @keyframes tw{0%,100%{opacity:0;transform:scale(.6) rotate(0deg);}50%{opacity:.8;transform:scale(1) rotate(15deg);}}
</style>
</head>
<body>
  <div class="glass">
    <span class="glow"></span>
    <span class="tex"></span>
    <span class="tri"></span>
    <span class="sheen"></span>
    <span class="sp" style="width:12px;height:12px;top:14px;left:20px;"></span>
    <span class="sp" style="width:9px;height:9px;top:34px;left:52px;animation-delay:.8s;"></span>
    <span class="sp" style="width:10px;height:10px;top:16px;left:90px;background:#9fb6e6;animation-delay:1.6s;"></span>
    <span class="sp" style="width:8px;height:8px;top:38px;left:124px;background:#f0a9ad;animation-delay:2.4s;"></span>
  </div>
</body>
</html>
