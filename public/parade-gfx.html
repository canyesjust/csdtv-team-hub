<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSDtv Parade Graphics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#c2283a; --reddot:#e0434f; --blue:#234fb0; --white:#ffffff; --gold:#f0cd7a;
    --glass:rgba(10,16,32,0.70);
    --rim:1px solid rgba(255,255,255,.30);
    --tsh:0 2px 6px rgba(0,0,0,.9),0 0 2px rgba(0,0,0,.55);
  }
  html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden;
    font-family:'Inter','Helvetica Neue',Arial,sans-serif;}
  body.demo{background:radial-gradient(120% 120% at 50% 0%,#2c4474,#0c1322);}
  #stage{position:absolute;top:0;left:0;width:1920px;height:1080px;transform-origin:top left;}

  /* shared glass */
  .glass{position:relative;overflow:hidden;background:var(--glass);
    backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);
    border:var(--rim);box-shadow:inset 0 2px 0 rgba(255,255,255,.45),0 16px 38px rgba(0,0,0,.55);}
  .glow{position:absolute;inset:0;z-index:1;mix-blend-mode:screen;opacity:.45;pointer-events:none;
    background:radial-gradient(46% 92% at 3% 60%,rgba(220,54,74,.8),transparent 72%),
               radial-gradient(48% 96% at 99% 48%,rgba(58,112,232,.9),transparent 72%);}
  .tri{position:absolute;left:0;right:0;bottom:0;z-index:4;height:5px;
    background:linear-gradient(90deg,var(--red) 0 33.3%,#eef1f6 33.3% 66.6%,var(--blue) 66.6% 100%);}
  .triV{position:absolute;top:0;bottom:0;right:0;z-index:4;width:5px;
    background:linear-gradient(180deg,var(--red) 0 33.3%,#eef1f6 33.3% 66.6%,var(--blue) 66.6% 100%);}
  .sheen{position:absolute;top:0;left:-55%;width:40%;height:100%;z-index:6;pointer-events:none;
    background:linear-gradient(105deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-18deg);
    animation:sweep 9s linear 2.5s infinite;}
  .sp{position:absolute;z-index:5;background:#fff;pointer-events:none;opacity:0;
    clip-path:polygon(50% 0,58% 42%,100% 50%,58% 58%,50% 100%,42% 58%,0 50%,42% 42%);
    animation:tw 3.6s ease-in-out infinite;}
  @keyframes sweep{0%{left:-55%;}16%{left:150%;}100%{left:150%;}}
  @keyframes tw{0%,100%{opacity:0;transform:scale(.6) rotate(0);}50%{opacity:.75;transform:scale(1) rotate(15deg);}}
  .content{position:relative;z-index:5;}
  .diam{width:12px;height:12px;background:var(--reddot);display:inline-block;flex:none;transform:rotate(45deg);}

  /* text styles */
  .nm{color:var(--white);font-weight:600;line-height:1.05;text-shadow:var(--tsh);white-space:nowrap;overflow:hidden;}
  .og{display:flex;align-items:center;gap:12px;margin-top:8px;}
  .og span{color:var(--gold);letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;text-shadow:var(--tsh);}
  .kick{color:var(--gold);letter-spacing:.18em;text-transform:uppercase;text-shadow:var(--tsh);}

  /* entrance animations (snappy) */
  .inL{opacity:0;transform:translateX(-52px);} .show .inL,.show.inL{opacity:1;transform:none;transition:opacity .3s ease,transform .34s cubic-bezier(.2,.85,.25,1);}
  .show .og.inL{transition-delay:.08s;}
  .inUp{opacity:0;transform:translateY(30px);} .show .inUp,.show.inUp{opacity:1;transform:none;transition:opacity .32s ease,transform .36s cubic-bezier(.2,.85,.25,1);}
  .inFade{opacity:0;transform:scale(.97);} .show .inFade,.show.inFade{opacity:1;transform:none;transition:opacity .4s ease,transform .42s cubic-bezier(.2,.8,.2,1);}
  .inPanel{opacity:0;transform:translateX(-110%);} .show .inPanel,.show.inPanel{opacity:1;transform:none;transition:opacity .25s ease,transform .42s cubic-bezier(.2,.85,.2,1);}

  #hint{position:fixed;top:14px;left:14px;z-index:50;font-size:13px;color:#fff;background:rgba(0,0,0,.6);padding:10px 14px;border-radius:8px;max-width:520px;line-height:1.5;}
  #hint b{color:var(--gold);}
</style>
</head>
<body>
<div id="stage"><div id="root"></div></div>
<div id="hint"></div>
<script>
(function(){
  var P=new URLSearchParams(location.search);
  if(P.get('demo')==='1') document.body.classList.add('demo');
  var type=(P.get('type')||'lower').toLowerCase();
  var stage=document.getElementById('stage'), root=document.getElementById('root'), hint=document.getElementById('hint');

  function resize(){var w=innerWidth,h=innerHeight,s=Math.min(w/1920,h/1080);
    stage.style.transform='translate('+((w-1920*s)/2)+'px,'+((h-1080*s)/2)+'px) scale('+s+')';}
  addEventListener('resize',resize); resize();

  function sparkles(n){var s='';var pos=[[18,14,12],[52,34,9],[92,16,10],[128,40,8]];
    for(var i=0;i<n;i++){var p=pos[i]; s+='<span class="sp" style="width:'+p[2]+'px;height:'+p[2]+'px;top:'+p[1]+'px;left:'+p[0]+'px;animation-delay:'+(i*0.7)+'s;'+(i%3===2?'background:#9fb6e6;':'')+'"></span>';}
    return s;}
  function esc(s){return (s||'').replace(/</g,'&lt;');}

  var LINEUP=[
    {name:"Corner Canyon Marching Band",org:"Charger Regiment"},
    {name:"American Legion Post 100",org:"Veterans Color Guard"},
    {name:"Daughters of the American Revolution",org:"Salt Lake Chapter"},
    {name:"Sandy City Fire Department",org:"Engine 31"},
    {name:"Alta High Drumline",org:"Hawks Percussion"},
    {name:"Utah National Guard",org:"19th Special Forces Group"},
    {name:"Draper Days Royalty",org:"2026 Royal Court"},
    {name:"Grand Marshal",org:"Mayor Monica Zoltanski"}
  ];

  var el; // main graphic element
  function mount(html){root.innerHTML=html; el=root.firstElementChild;}
  function show(){ if(el){ el.classList.remove('show'); void el.offsetWidth; el.classList.add('show'); } }
  function hide(){ if(el) el.classList.remove('show'); }

  function fit(node,max,start,min){node.style.fontSize=start+'px';var s=start;while(node.scrollWidth>max&&s>min){s--;node.style.fontSize=s+'px';}}

  // ---------- graphic builders ----------
  function lower(name,org,size){
    var big=size==='small'?40:56, sub=size==='small'?20:26, w=size==='small'?720:1000, h=size==='small'?120:170;
    mount('<div class="glass inL" style="position:absolute;left:80px;bottom:80px;width:'+w+'px;border-radius:16px;padding:22px 40px 26px;">'
      +'<span class="glow"></span>'+sparkles(3)+'<span class="tri"></span><span class="sheen"></span>'
      +'<div class="content"><div class="nm inL show-nm" id="nm" style="font-size:'+big+'px;"></div>'
      +'<div class="og inL"><i class="diam"></i><span id="og" style="font-size:'+sub+'px;"></span></div></div></div>');
    return function(n,o){document.getElementById('nm').textContent=n;document.getElementById('og').textContent=o;
      fit(document.getElementById('nm'), w-90, big, big-22);};
  }
  function lower1(text){
    mount('<div class="glass inL" style="position:absolute;left:80px;bottom:90px;width:1000px;border-radius:16px;padding:26px 40px 30px;">'
      +'<span class="glow"></span>'+sparkles(3)+'<span class="tri"></span><span class="sheen"></span>'
      +'<div class="content"><div class="nm inL" style="font-size:60px;">'+esc(text)+'</div></div></div>');
  }
  function topic(kick,title){
    mount('<div class="glass inL" style="position:absolute;left:80px;bottom:80px;border-radius:16px;padding:18px 42px 22px;">'
      +'<span class="glow"></span><span class="tri"></span><span class="sheen"></span>'
      +'<div class="content"><div class="kick inL" style="font-size:22px;">'+esc(kick)+'</div>'
      +'<div class="nm inL" style="font-size:48px;margin-top:6px;">'+esc(title)+'</div></div></div>');
  }
  function coming(name){
    mount('<div class="glass inUp" style="position:absolute;right:80px;bottom:80px;max-width:620px;border-radius:14px;padding:14px 26px 16px;">'
      +'<span class="glow"></span><span class="tri"></span>'
      +'<div class="content"><div class="kick inUp" style="font-size:17px;">Coming up</div>'
      +'<div class="nm inUp" style="font-size:30px;margin-top:3px;">'+esc(name)+'</div></div></div>');
  }
  function panel(title,text,logo){
    var img=logo?'<div style="width:100%;height:300px;border-radius:10px;background:#0d1626 center/contain no-repeat url('+esc(logo)+');margin:16px 0;"></div>':'';
    mount('<div class="glass inPanel" style="position:absolute;left:0;top:180px;width:560px;border-radius:0 18px 18px 0;padding:26px 40px 30px;">'
      +'<span class="glow"></span>'+sparkles(3)+'<span class="triV"></span><span class="sheen"></span>'
      +'<div class="content"><div class="kick inL" style="font-size:20px;">Proud sponsor</div>'
      +'<div class="nm inL" style="font-size:46px;margin-top:6px;white-space:normal;">'+esc(title)+'</div>'
      +img+'<div style="color:#e8ecf5;font-size:24px;line-height:1.4;white-space:pre-line;text-shadow:var(--tsh);" class="inL">'+esc(text)+'</div></div></div>');
  }
  function fullTitle(title,sub,timer){
    mount('<div class="glass inFade" style="position:absolute;left:8%;right:8%;top:22%;bottom:22%;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">'
      +'<span class="glow"></span>'+sparkles(4)+'<span class="tri"></span><span class="sheen"></span>'
      +'<div class="content" style="padding:0 60px;"><div class="nm inUp" style="font-size:120px;letter-spacing:.02em;white-space:normal;">'+esc(title)+'</div>'
      +(sub?'<div class="kick inUp" style="font-size:40px;margin-top:24px;">'+esc(sub)+'</div>':'')
      +(timer?'<div class="nm inUp" id="tmr" style="font-size:56px;margin-top:30px;">'+esc(timer)+'</div>':'')
      +'</div></div>');
  }
  function fullText(title,body){
    mount('<div class="glass inFade" style="position:absolute;left:8%;right:8%;top:20%;bottom:20%;border-radius:22px;padding:60px 80px;display:flex;flex-direction:column;justify-content:center;">'
      +'<span class="glow"></span><span class="tri"></span><span class="sheen"></span>'
      +'<div class="content"><div class="nm inUp" style="font-size:64px;white-space:normal;">'+esc(title)+'</div>'
      +'<div class="inUp" style="color:#e8ecf5;font-size:38px;line-height:1.5;margin-top:22px;white-space:pre-line;text-shadow:var(--tsh);">'+esc(body)+'</div></div></div>');
  }
  function slate(title,logo){
    var img=logo?'<div style="width:70%;height:360px;margin:30px auto 0;background:center/contain no-repeat url('+esc(logo)+');"></div>':'';
    mount('<div class="glass inFade" style="position:absolute;left:8%;right:8%;top:22%;bottom:22%;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">'
      +'<span class="glow"></span>'+sparkles(4)+'<span class="tri"></span><span class="sheen"></span>'
      +'<div class="content" style="padding:0 60px;width:100%;"><div class="kick inUp" style="font-size:34px;">Brought to you by</div>'
      +'<div class="nm inUp" style="font-size:88px;margin-top:16px;white-space:normal;">'+esc(title)+'</div>'+img+'</div></div>');
  }
  function social(handle,platform){
    mount('<div class="glass inFade" style="position:absolute;left:8%;right:8%;top:26%;bottom:26%;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">'
      +'<span class="glow"></span>'+sparkles(4)+'<span class="tri"></span><span class="sheen"></span>'
      +'<div class="content"><div class="kick inUp" style="font-size:34px;">Follow along</div>'
      +'<div class="nm inUp" style="font-size:96px;margin-top:14px;">'+esc(handle)+'</div>'
      +(platform?'<div class="kick inUp" style="font-size:34px;margin-top:16px;">'+esc(platform)+'</div>':'')+'</div></div>');
  }
  function ticker(items){
    var seq=items.concat(items); var inner=seq.map(function(t){return '<span style="padding:0 60px;">'+esc(t)+'</span><span style="color:var(--gold);">&#9670;</span>';}).join('');
    mount('<div class="glass show" style="position:absolute;left:0;right:0;bottom:0;height:64px;border-radius:0;display:flex;align-items:center;overflow:hidden;">'
      +'<span class="tri"></span>'
      +'<div style="position:absolute;left:0;top:0;bottom:0;width:230px;z-index:6;background:var(--glass);display:flex;align-items:center;justify-content:center;border-right:2px solid rgba(255,255,255,.25);"><span class="kick" style="font-size:24px;">CSDtv Parade</span></div>'
      +'<div class="content" style="white-space:nowrap;padding-left:250px;color:#fff;font-size:26px;text-shadow:var(--tsh);animation:mar 40s linear infinite;">'+inner+'</div></div>');
    var st=document.createElement('style'); st.textContent='@keyframes mar{from{transform:translateX(0)}to{transform:translateX(-50%)}}'; document.head.appendChild(st);
  }
  function bug(text){
    mount('<div class="glass show" style="position:absolute;right:70px;top:60px;border-radius:40px;padding:12px 26px;display:flex;align-items:center;gap:12px;">'
      +'<span style="width:14px;height:14px;border-radius:50%;background:var(--reddot);"></span>'
      +'<span style="color:#fff;font-weight:500;font-size:26px;letter-spacing:.04em;text-shadow:var(--tsh);">'+esc(text||'CSDtv LIVE')+'</span></div>');
  }
  function clock(){
    mount('<div class="glass show" style="position:absolute;left:70px;top:60px;border-radius:40px;padding:12px 30px;">'
      +'<span id="clk" style="color:#fff;font-weight:500;font-size:30px;letter-spacing:.06em;text-shadow:var(--tsh);"></span></div>');
    function u(){var d=new Date(),h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;document.getElementById('clk').textContent=h+':'+(m<10?'0':'')+m+' '+ap;}
    u(); setInterval(u,1000);
  }

  // ---------- route ----------
  var stepper=null, idx=-1;
  function autoShow(){ setTimeout(show,180); }

  if(type==='lower' || type==='host' || type==='lineup'){
    var size=P.get('size')||'large';
    var setNO=lower(P.get('name'), P.get('org'), size);
    if(P.get('name')!==null){ setNO(P.get('name'), P.get('org')||''); autoShow(); }
    else { // lineup stepping mode
      stepper=function(i){ if(i<0)i=0; if(i>LINEUP.length-1)i=LINEUP.length-1; idx=i; setNO(LINEUP[i].name, LINEUP[i].org); show(); };
      hintText('Lineup mode — <b>Space/&rarr;</b> next &middot; <b>&larr;</b> back &middot; <b>C</b> clear');
    }
  }
  else if(type==='lower1'){ lower1(P.get('text')||''); autoShow(); }
  else if(type==='topic'){ topic(P.get('kick')||'Now', P.get('title')||''); autoShow(); }
  else if(type==='coming'){ coming(P.get('name')||''); autoShow(); }
  else if(type==='panel'){ panel(P.get('title')||'', (P.get('text')||'').replace(/\|/g,'\n'), P.get('logo')); autoShow(); }
  else if(type==='title'){ fullTitle(P.get('title')||'WELCOME', P.get('sub')||'', P.get('timer')||''); autoShow(); }
  else if(type==='fulltext'){ fullText(P.get('title')||'', (P.get('body')||'').replace(/\|/g,'\n')); autoShow(); }
  else if(type==='slate'){ slate(P.get('title')||'', P.get('logo')); autoShow(); }
  else if(type==='social'){ social(P.get('handle')||'@CSDtv', P.get('platform')||''); autoShow(); }
  else if(type==='ticker'){ ticker((P.get('items')||'Welcome to the parade|Follow @CSDtv|Thanks to our sponsors').split('|')); }
  else if(type==='bug'){ bug(P.get('text')); }
  else if(type==='clock'){ clock(); }
  else { lower1('Unknown type: '+esc(type)); autoShow(); }

  // keyboard for lineup stepper
  addEventListener('keydown',function(e){
    if(!stepper) return; var k=e.key.toLowerCase();
    if(k===' '||k==='arrowright'||k==='n'){e.preventDefault(); if(!(idx>=LINEUP.length-1&&el&&el.classList.contains('show'))) stepper(idx+1);}
    else if(k==='arrowleft'||k==='p'){e.preventDefault(); if(idx>0) stepper(idx-1);}
    else if(k==='c'||k==='escape'){ hide(); }
  });
  // postMessage: {name,org} or {action:'show'|'hide'|'next'|'prev'}
  addEventListener('message',function(ev){var d=ev.data||{}; if(typeof d!=='object')return;
    if('name' in d && el){var n=el.querySelector('#nm'),o=el.querySelector('#og'); if(n){n.textContent=d.name;} if(o){o.textContent=d.org||'';}}
    if(d.action==='show') show(); else if(d.action==='hide') hide();
    else if(d.action==='next'&&stepper) stepper(idx+1); else if(d.action==='prev'&&stepper) stepper(idx-1);
  });

  function hintText(h){ if(P.get('clean')==='1'){hint.style.display='none';return;} hint.innerHTML=h; setTimeout(function(){hint.style.opacity='0';setTimeout(function(){hint.style.display='none';},700);},8000); }
  if(type!=='lower'&&type!=='host'&&type!=='lineup') hintText('Graphic: <b>'+esc(type)+'</b> &middot; add <b>?clean=1</b> to hide this note');
})();
</script>
</body>
</html>
