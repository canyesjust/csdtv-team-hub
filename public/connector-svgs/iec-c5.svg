           Q 40 60 70 60
           L 130 60
           Q 160 60 160 100
           Q 160 130 130 130
           Q 130 145 100 145
           Q 70 145 70 130
           Q 40 130 40 100 Z"
        fill="#222" stroke="#000" stroke-width="2"/>
  <!-- Three round holes in cloverleaf -->
  <circle cx="75" cy="95" r="11" fill="#000"/>
  <circle cx="125" cy="95" r="11" fill="#000"/>
  <circle cx="100" cy="125" r="11" fill="#000"/>

</svg>