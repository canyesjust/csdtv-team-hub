<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<rect width="200" height="200" fill="#f8f8f8"/>

  <!-- BNC bayonet (SDI) -->
  <circle cx="100" cy="100" r="50" fill="#888" stroke="#000" stroke-width="2"/>
  <circle cx="100" cy="100" r="38" fill="#444"/>
  <!-- Bayonet notches -->
  <rect x="60" y="95" width="10" height="10" fill="#fff" stroke="#000" stroke-width="1"/>
  <rect x="130" y="95" width="10" height="10" fill="#fff" stroke="#000" stroke-width="1"/>
  <!-- Center pin -->
  <circle cx="100" cy="100" r="6" fill="#c8a045"/>

</svg>