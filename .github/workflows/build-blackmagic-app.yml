name: Build Blackmagic Update Checker

# Builds the desktop app into a real double-click .app (macOS) and .exe (Windows)
# and publishes them as assets on a GitHub Release. The /blackmagic-updater
# download page links to the "latest release" assets, so those links always point
# at the newest build.
#
# You don't have to do anything special to trigger this. It runs automatically
# whenever the app source changes on main. It also has a manual "Run workflow"
# button in the Actions tab if you ever want it, but you never need that.
# When it finishes it publishes/updates a single Release ("app-latest") with the
# two app zips attached, which is what the download page links to.

on:
  push:
    branches: [main]
    paths:
      - 'desktop/blackmagic-updater/**'
      - '.github/workflows/build-blackmagic-app.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Blackmagic Update Checker
  SRC_DIR: desktop/blackmagic-updater

jobs:
  build-macos:
    # Was macos-13 (Intel), but those runners now queue for hours and often never
    # pick up the job. Moved to macos-latest (Apple Silicon) so the build runs.
    # Trade-off: this produces an Apple Silicon app. Intel Macs would need a
    # universal2 build (a follow-up); most current staff Macs are Apple Silicon.
    runs-on: macos-latest
    env:
      # These come from repo Secrets. If they're empty, signing is skipped and
      # the app is built unsigned (still works, just shows a first-launch warning).
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build icon.icns
        working-directory: ${{ env.SRC_DIR }}
        run: iconutil -c icns icon.iconset -o icon.icns
      - name: Build .app
        working-directory: ${{ env.SRC_DIR }}
        run: |
          pyinstaller --noconfirm --windowed --onefile \
            --name "$APP_NAME" \
            --icon icon.icns \
            --add-data "catalog.json:." \
            blackmagic_updater.py
      - name: Sign and notarize (only if certs are configured)
        if: env.MACOS_CERT_P12_BASE64 != ''
        working-directory: ${{ env.SRC_DIR }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          codesign --deep --force --options runtime --timestamp \
            --sign "$MACOS_SIGN_IDENTITY" "dist/$APP_NAME.app"
          ditto -c -k --keepParent "dist/$APP_NAME.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "dist/$APP_NAME.app"
      - name: Zip the .app
        working-directory: ${{ env.SRC_DIR }}/dist
        run: ditto -c -k --keepParent "$APP_NAME.app" "Blackmagic-Update-Checker-macOS.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ${{ env.SRC_DIR }}/dist/Blackmagic-Update-Checker-macOS.zip

  build-windows:
    runs-on: windows-latest
    env:
      # From repo Secrets. Empty = skip signing, build unsigned.
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Build .exe
        working-directory: ${{ env.SRC_DIR }}
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "$env:APP_NAME" `
            --icon icon.ico `
            --add-data "catalog.json;." `
            blackmagic_updater.py
      - name: Sign (only if a cert is configured)
        if: env.WINDOWS_CERT_PFX_BASE64 != ''
        working-directory: ${{ env.SRC_DIR }}
        shell: pwsh
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName | Select-Object -Last 1
          & $signtool.FullName sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            "dist\$env:APP_NAME.exe"
      - name: Zip the .exe
        working-directory: ${{ env.SRC_DIR }}/dist
        run: Compress-Archive -Path "$env:APP_NAME.exe" -DestinationPath "Blackmagic-Update-Checker-Windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ env.SRC_DIR }}/dist/Blackmagic-Update-Checker-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish / update the latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: Blackmagic Update Checker (latest)
          make_latest: true
          body: |
            Self-contained builds of the Blackmagic Update Checker. Rebuilt automatically on every update.

            - macOS: download the zip, unzip, drag the app to Applications. First launch: right-click the app and choose Open (it's unsigned).
            - Windows: download the zip, unzip, run the .exe. If SmartScreen warns, click More info -> Run anyway (it's unsigned).
          files: |
            artifacts/macos/Blackmagic-Update-Checker-macOS.zip
            artifacts/windows/Blackmagic-Update-Checker-Windows.zip
